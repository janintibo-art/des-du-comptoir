<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Le Tout-Cinq</title>
<link rel="icon" href="favicon.png">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="cards.css">
<style>
.domino{--dh:clamp(120px,25vh,178px);height:var(--dh);width:calc(var(--dh)*.5);min-width:calc(var(--dh)*.5);background:transparent;border:none;padding:0;cursor:pointer;overflow:visible}
.domino img{height:var(--dh);width:auto;display:block;border-radius:calc(var(--dh)*.05);filter:drop-shadow(0 3px 7px rgba(0,0,0,.5))}
.domino.txt{background:#f7f2e6;color:#141410;border:1px solid #b9b09b;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:calc(var(--dh)*.16)}
.domino.off{opacity:.34;cursor:default}
.domino.play{outline:3px solid var(--accent);outline-offset:1px;border-radius:10px}
#cHand{display:flex;gap:6px;overflow-x:auto;padding:16px 6px 4px;-webkit-overflow-scrolling:touch}
.board{display:flex;align-items:center;gap:8px;width:100%}
.chain{display:flex;gap:3px;overflow-x:auto;padding:4px;flex:1;-webkit-overflow-scrolling:touch}
.chain .domino{--dh:clamp(64px,13vh,96px)}
.endbadge{flex-shrink:0;min-width:44px;height:52px;border-radius:10px;background:rgba(224,163,76,.15);border:1px solid var(--accent);color:var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:bold;font-size:20px;line-height:1}
.endbadge small{font-size:10px;opacity:.7;font-weight:normal}
.yard{text-align:center;font-size:13px;opacity:.65;margin-top:6px}
</style>
<script src="dominos.js"></script>
<script src="rules-data.js"></script>
<script src="card-shell.js"></script>
</head>
<body class="menu">
<script>
'use strict';
const pip=t=>t.a+t.b, TARGET=100;
function scoreEnds(chain){
  if(chain.length===0) return 0;
  if(chain.length===1){ const n=chain[0]; return n.a===n.b? 2*n.a : n.a+n.b; }
  const l=chain[0], r=chain[chain.length-1];
  return ((l.a===l.b)?2*l.a:l.a) + ((r.a===r.b)?2*r.b:r.b);
}
CardShell({
  id:'toutcinq', title:'LE TOUT-CINQ', minPlayers:2, maxPlayers:4, skinModule:Dominos,
  run: async GC => {
    const P=GC.players, N=P.length;
    P.forEach(p=> p.total=0);
    const totals=turn=>GC.scores(P.map((p,i)=>({label:p.name,value:p.total,active:i===turn})));
    const showOpps=(me,turn)=>GC.opponents(P.filter(p=>p!==me).map(p=>({name:p.name,count:p.hand.length,turn:P.indexOf(p)===turn})));

    async function playRound(){
      const set=Dominos.shuffle(Dominos.fullSet());
      const per=N===2?7:5;
      P.forEach(p=> p.hand=set.splice(0,per).sort((a,b)=>pip(a)-pip(b)));
      let yard=set, chain=[], L=null, R=null;
      const playable=t=> t.a===L||t.b===L||t.a===R||t.b===R;
      function place(t,side){ if(side==='R'){const o=t.a===R?t.b:t.a;chain.push({a:R,b:o});R=o;}
        else{const o=t.a===L?t.b:t.a;chain.unshift({a:o,b:L});L=o;} }
      function renderBoard(){
        const wrap=document.createElement('div'); wrap.style.width='100%';
        const board=document.createElement('div'); board.className='board';
        const bl=document.createElement('div'); bl.className='endbadge'; bl.innerHTML='<small>gauche</small>'+L;
        const ch=document.createElement('div'); ch.className='chain'; chain.forEach(t=>ch.appendChild(Dominos.el(t,{})));
        const br=document.createElement('div'); br.className='endbadge'; br.innerHTML='<small>droite</small>'+R;
        board.appendChild(bl); board.appendChild(ch); board.appendChild(br);
        const yd=document.createElement('div'); yd.className='yard';
        const s=scoreEnds(chain); yd.textContent='Pioche : '+yard.length+'   ·   Bouts = '+s+(s%5===0&&s>0?' (multiple de 5 !)':'');
        wrap.appendChild(board); wrap.appendChild(yd); GC.center(wrap);
        requestAnimationFrame(()=>{ ch.scrollLeft=ch.scrollWidth; });
      }
      function renderHand(p,opts,onPick){ const hand=document.getElementById('cHand'); hand.innerHTML='';
        p.hand.forEach(t=>{ const ok=opts.includes(t); const el=Dominos.el(t,{onClick:ok?()=>onPick(t):null,disabled:!ok});
          if(ok) el.classList.add('play'); hand.appendChild(el); }); }
      function tallyScore(who){ const s=scoreEnds(chain); if(s%5===0&&s>0){ P[who].total+=s;
        GC.combo(P[who].name+' marque '+s+' ! ('+P[who].total+')'); GC.Snd.good&&GC.Snd.good(); } }

      async function humanTurn(p,pi){
        await GC.handOff(p.name);
        while(true){
          totals(pi); showOpps(p,pi); renderBoard();
          const opts=p.hand.filter(playable);
          if(opts.length){ GC.say('À vous, '+p.name+' — touchez une tuile jouable.'); GC.setButtons([]);
            const mv=await new Promise(res=> renderHand(p,opts, async t=>{
              const mR=t.a===R||t.b===R, mL=t.a===L||t.b===L; let side;
              if(mR&&mL&&L!==R){ side=await GC.ask([{id:'L',label:'◀ Gauche ('+L+')'},{id:'R',label:'Droite ('+R+') ▶',primary:true}]); GC.setButtons([]); }
              else side=mR?'R':'L'; res({t,side}); }));
            place(mv.t,mv.side); p.hand.splice(p.hand.indexOf(mv.t),1); GC.play();
            renderBoard(); tallyScore(pi); return {passed:false}; }
          if(yard.length){ GC.say('Aucune tuile jouable — piochez.'); renderHand(p,[],null);
            await GC.ask([{id:'d',label:'Piocher',primary:true}]); GC.setButtons([]);
            p.hand.push(yard.shift()); p.hand.sort((a,b)=>pip(a)-pip(b)); GC.play(); continue; }
          GC.say('Bloqué — vous passez.'); renderHand(p,[],null);
          await GC.ask([{id:'p',label:'Passer',primary:true}]); GC.setButtons([]); return {passed:true};
        }
      }
      async function aiTurn(p,pi){
        totals(pi); showOpps(p,pi); renderBoard(); GC.say(p.name+' réfléchit…'); await GC.sleep(750);
        let opts=p.hand.filter(playable);
        while(!opts.length&&yard.length){ p.hand.push(yard.shift()); opts=p.hand.filter(playable); GC.combo(p.name+' pioche.'); await GC.sleep(350); }
        if(!opts.length){ GC.combo(p.name+' passe.'); return {passed:true}; }
        // IA : préfère un coup qui marque, sinon lâche la plus lourde
        let best=null,bestSc=-1;
        opts.forEach(t=>{ ['R','L'].forEach(side=>{ if(side==='R'&&!(t.a===R||t.b===R))return; if(side==='L'&&!(t.a===L||t.b===L))return;
          const sav={chain:chain.slice(),L,R}; place(t,side); const s=scoreEnds(chain); const val=(s%5===0?s:0)*10+pip(t);
          chain=sav.chain;L=sav.L;R=sav.R; if(val>bestSc){bestSc=val;best={t,side};} }); });
        place(best.t,best.side); p.hand.splice(p.hand.indexOf(best.t),1);
        GC.combo(p.name+' pose le '+best.t.a+'-'+best.t.b+'.'); GC.play(); renderBoard(); tallyScore(pi); await GC.sleep(550);
        return {passed:false};
      }

      let starter=0,bv=-1,bt=null;
      P.forEach((p,i)=>p.hand.forEach(t=>{const v=(t.a===t.b?100:0)+pip(t);if(v>bv){bv=v;starter=i;bt=t;}}));
      chain=[{a:bt.a,b:bt.b}]; L=bt.a; R=bt.b; P[starter].hand.splice(P[starter].hand.indexOf(bt),1);
      GC.say((P[starter].ai?P[starter].name:'Vous')+' ouvre avec le '+bt.a+'-'+bt.b+'.');
      totals(-1); renderBoard(); tallyScore(starter); await GC.sleep(1100);
      let out=P[starter].hand.length===0?starter:-1, turn=(starter+1)%N, passes=0;
      while(out<0){
        const p=P[turn]; const res=p.ai?await aiTurn(p,turn):await humanTurn(p,turn);
        if(res.passed){ passes++; if(passes>=N) break; }
        else { passes=0; if(p.hand.length===0){ out=turn; break; } }
        await GC.sleep(300); turn=(turn+1)%N;
      }
      // bonus de fin de manche
      if(out>=0){ let opp=0; P.forEach((p,i)=>{ if(i!==out) opp+=p.hand.reduce((a,t)=>a+pip(t),0); });
        const bonus=Math.round(opp/5)*5; P[out].total+=bonus;
        GC.combo(P[out].name+' sort et empoche '+bonus+' pts !'); }
      else { const sums=P.map(p=>p.hand.reduce((a,t)=>a+pip(t),0)); const mn=Math.min(...sums); const w=sums.indexOf(mn);
        const bonus=Math.round((sums.reduce((a,b)=>a+b,0)-mn)/5)*5; P[w].total+=bonus;
        GC.combo('Bloqué — '+P[w].name+' marque '+bonus+' pts.'); }
      totals(-1); await GC.sleep(2200);
    }

    GC.say('Marquez quand les deux bouts font un multiple de 5. Premier à 100 !');
    totals(-1); await GC.sleep(1000);
    while(!P.some(p=>p.total>=TARGET)){
      await playRound();
      GC.say('Scores : '+P.map(p=>p.name+' '+p.total).join(' · ')); await GC.sleep(1400);
    }
    const ranked=[...P].sort((a,b)=>b.total-a.total);
    return GC.gameOver('Victoire de '+ranked[0].name+' !', ranked.map(p=>p.name+' : '+p.total+' pts').join('<br>'));
  }
});
</script>
</body>
</html>
