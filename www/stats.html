<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Statistiques — Les Dés du Comptoir</title>
<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14140f">
<link rel="stylesheet" href="style.css">
<script src="rules-data.js"></script>
<style>
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px;text-align:center}
.wrap h1{color:var(--accent);letter-spacing:.14em;margin:18px 0 16px}
table.st{margin:0 auto 20px;border-collapse:collapse;font-size:15px;width:100%;max-width:520px}
table.st td,table.st th{padding:8px 12px;border-bottom:1px solid rgba(242,232,213,.15)}
table.st th{color:var(--accent);letter-spacing:.06em}
table.st td:first-child{text-align:left}
.skins{opacity:.85;margin:14px 0;line-height:1.6}
.row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0}
.back{display:inline-block;margin:14px;color:var(--cream);text-decoration:none;opacity:.8}
.muted{opacity:.6;font-size:14px}
.grp{color:var(--accent);letter-spacing:.06em;margin:20px 4px 6px;text-align:left;font-weight:bold}
table.st tr.sub td{opacity:.7;font-style:italic;border-top:1px solid rgba(242,232,213,.2)}
</style>
</head>
<body class="menu">
<a class="back" href="index.html">← Retour au comptoir</a>
<div class="wrap">
  <h1>📊 VOS STATISTIQUES</h1>
  <div id="content"></div>
  <div class="row">
    <button onclick="unlockAll()">🎨 Tout débloquer (styles de dés)</button>
    <button onclick="if(confirm('Effacer toutes les statistiques ?')){localStorage.removeItem('gc-stats');location.reload();}">🗑 Réinitialiser les stats</button>
  </div>
  <p class="muted">Un style de dés se débloque à chaque victoire d'un joueur humain.</p>
</div>
<script>
'use strict';
const GROUPS=[
  ['🎲 Dés', ['421','10000','yams','poker','zanzibar','mexico','chicago','cochon','passedix','boston','boite','martinetti','cochontroue']],
  ['🃏 Cartes', ['bataille','president','huit','tarot','hearts','pouilleux','scopa','menteur','rami']],
  ['🁢 Dominos', ['domino','toutcinq','matador','train']],
  ['🌰 Awalé', ['awale','awale234','kalah']],
  ['♟ Dames & Échecs', ['dames','echecs','p4','reversi']],
];
const ALL=['fantasy','neon','ocean','gothic','steampunk','crystal','tribal','candy','ice','streetart','biomech','origami'];
const LS={get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return d;}},
          set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};
const stats=LS.get('gc-stats',{});
const skins=LS.get('gc-skins',['fantasy','neon','ocean']);
const title=id=>(window.RULES&&window.RULES[id]&&window.RULES[id].title)||id;
let gPlayed=0,gWon=0, html='';
GROUPS.forEach(([label,ids])=>{
  const present=ids.filter(id=>stats[id]&&stats[id].played);
  let sp=0,sw=0;
  const rows=ids.map(id=>{ const st=stats[id]; if(!st||!st.played) return '';
    sp+=st.played; sw+=st.won;
    const pct=Math.round(100*st.won/st.played)+' %';
    return '<tr><td>'+title(id)+'</td><td>'+st.played+'</td><td>'+st.won+'</td><td>'+pct+'</td></tr>';
  }).join('');
  if(!rows){ return; }
  gPlayed+=sp; gWon+=sw;
  html+='<div class="grp">'+label+'</div><table class="st">'+
    '<tr><th>Jeu</th><th>Parties</th><th>Gagnées</th><th>%</th></tr>'+rows+
    '<tr class="sub"><td>Sous-total</td><td>'+sp+'</td><td>'+sw+'</td><td>'+(sp?Math.round(100*sw/sp)+' %':'—')+'</td></tr>'+
    '</table>';
});
if(!html) html='<p class="muted">Aucune partie jouée pour l\u2019instant. Lancez une partie et revenez !</p>';
html+='<table class="st" style="margin-top:18px"><tr><th>TOTAL</th><th>'+gPlayed+'</th><th>'+gWon+'</th><th>'+(gPlayed?Math.round(100*gWon/gPlayed)+' %':'—')+'</th></tr></table>';
html+='<p class="skins">🎨 Styles de dés débloqués : <b>'+skins.length+' / '+ALL.length+'</b></p>';
document.getElementById('content').innerHTML=html;
function unlockAll(){ LS.set('gc-skins', ALL); location.reload(); }
</script>
</body>
</html>
