<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>UNO</title>
<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14140f">
<link rel="stylesheet" href="style.css">

<style>
.uno-table{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%}
.uno-piles{display:flex;align-items:center;gap:18px}
.uno-card{width:clamp(70px,18vw,96px);aspect-ratio:0.68;border-radius:10px;overflow:hidden;box-shadow:0 3px 9px rgba(0,0,0,.45)}
.uno-card img{width:100%;height:100%;object-fit:contain;display:block}
.uno-draw{width:clamp(70px,18vw,96px);aspect-ratio:0.68;border-radius:10px;background:linear-gradient(135deg,#46423a,#14140f);border:2px solid rgba(242,232,213,.35);display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--cream);cursor:pointer;font-size:12px;text-align:center;gap:3px}
.uno-draw:hover{border-color:var(--accent)}
.uno-draw .big{font-size:22px}
.uno-info{display:flex;align-items:center;gap:14px;font-size:14px;opacity:.9}
.uno-color{width:24px;height:24px;border-radius:50%;border:2px solid #fff;display:inline-block;vertical-align:middle}
.color-R{background:#d63b3b}.color-G{background:#3aa63a}.color-B{background:#3366cc}.color-Y{background:#e6b800}
.uno-dir{font-size:20px}
.unocard{background:none;border:none;padding:0;cursor:pointer;width:clamp(58px,15vw,80px);aspect-ratio:0.68;border-radius:9px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.4);transition:transform .12s;flex:none}
.unocard img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none}
.unocard.play{outline:3px solid var(--accent);outline-offset:-2px}
.unocard.play:hover{transform:translateY(-10px)}
.unocard.off{opacity:.45;cursor:default}
#cHand{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;overflow-x:visible}
</style>
<script src="rules-data.js"></script>
<script src="card-shell.js"></script>
<script>
'use strict';
const COLORS=['R','G','B','Y'];
const CNAME={R:'Rouge',G:'Vert',B:'Bleu',Y:'Jaune'};
const VLABEL={skip:'Passer ⊘',rev:'Inverser ↯',d2:'+2',wild:'Joker',wild4:'+4'};
function fileFor(card){ if(card.c==='W') return 'uno/'+(card.v==='wild4'?'W4':'W')+'.webp'; return 'uno/'+card.c+'-'+card.v+'.webp'; }
function vlabel(card){ return VLABEL[card.v]|| card.v; }
const UnoSkin={
  buildSkinSelect(sel){ sel.style.display='none'; },
  el(card,opts){ opts=opts||{}; const b=document.createElement('button');
    b.className='unocard'+(opts.disabled?' off':''); const img=new Image(); img.src=fileFor(card); img.draggable=false; b.appendChild(img);
    if(opts.onClick && !opts.disabled) b.addEventListener('click',()=>opts.onClick(card)); else b.disabled=!!opts.disabled;
    return b; }
};
/* moteur */
function buildDeck(){ const d=[];
  for(const c of COLORS){ d.push({c,v:'0'});
    for(const v of ['1','2','3','4','5','6','7','8','9','skip','rev','d2']){ d.push({c,v}); d.push({c,v}); } }
  for(let i=0;i<4;i++){ d.push({c:'W',v:'wild'}); d.push({c:'W',v:'wild4'}); }
  return d; }
function shuffle(d){ for(let i=d.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [d[i],d[j]]=[d[j],d[i]]; } return d; }
const playable=(card,top)=> card.c==='W' || card.c===top.color || card.v===top.v;
function initGame(names){ const draw=shuffle(buildDeck());
  const players=names.map(n=>({name:n, hand:draw.splice(0,7)}));
  let start=draw.shift(), guard=0;
  while(start.v==='wild4' && guard++<50){ draw.push(start); shuffle(draw); start=draw.shift(); }
  const top={ color: start.c==='W'? COLORS[Math.floor(Math.random()*4)] : start.c, v:start.v };
  return {players, draw, discard:[start], top, dir:1, turn:0, over:false}; }
function reshuffle(s){ if(s.draw.length||s.discard.length<2) return; const keep=s.discard.pop(); s.draw=shuffle(s.discard); s.discard=[keep]; }
function drawN(s,pi,n){ for(let i=0;i<n;i++){ reshuffle(s); if(!s.draw.length)break; s.players[pi].hand.push(s.draw.shift()); } }
function advance(s,steps){ const N=s.players.length; s.turn=((s.turn + s.dir*steps)%N+N)%N; }
function applyPlay(s,pi,idx,chosen){ const p=s.players[pi]; const card=p.hand[idx];
  p.hand.splice(idx,1); s.discard.push(card); const N=s.players.length;
  s.top={ color: card.c==='W'? chosen : card.c, v:card.v };
  if(p.hand.length===0){ s.over=true; s.winner=pi; return {}; }
  let drewInfo=null;
  if(card.v==='skip'){ advance(s,2); }
  else if(card.v==='rev'){ s.dir=-s.dir; advance(s, N===2?2:1); }
  else if(card.v==='d2'){ const nx=((s.turn+s.dir)%N+N)%N; drawN(s,nx,2); drewInfo={who:nx,n:2}; advance(s,2); }
  else if(card.v==='wild4'){ const nx=((s.turn+s.dir)%N+N)%N; drawN(s,nx,4); drewInfo={who:nx,n:4}; advance(s,2); }
  else advance(s,1);
  return {drewInfo}; }
function legalIdx(s,pi){ const h=s.players[pi].hand,out=[]; for(let i=0;i<h.length;i++) if(playable(h[i],s.top)) out.push(i); return out; }
function chooseColor(hand){ const c={R:0,G:0,B:0,Y:0}; hand.forEach(x=>{ if(x.c!=='W')c[x.c]++; });
  let best='R',bv=-1; for(const k of COLORS) if(c[k]>bv){bv=c[k];best=k;} return best; }
</script>
</head>
<body class="menu">
<script>
'use strict';
CardShell({
  id:'uno', title:'UNO', minPlayers:2, maxPlayers:4, skinModule:UnoSkin,
  run: async GC => {
    const P=GC.players, N=P.length; const humans=P.filter(p=>!p.ai).length;
    let s=initGame(P.map(p=>p.name));
    let onDraw=null;
    const scores=()=>GC.scores(P.map((p,i)=>({label:p.name, value:s.players[i].hand.length+' 🂠', active:i===s.turn})));
    function center(canDraw){
      const t=document.createElement('div'); t.className='uno-table';
      const info=document.createElement('div'); info.className='uno-info';
      info.innerHTML='Couleur : <span class="uno-color color-'+s.top.color+'"></span> '+CNAME[s.top.color]
        +' <span class="uno-dir">'+(s.dir>0?'↻':'↺')+'</span>';
      t.appendChild(info);
      const piles=document.createElement('div'); piles.className='uno-piles';
      const disc=document.createElement('div'); disc.className='uno-card';
      const top=s.discard[s.discard.length-1]; const dimg=new Image(); dimg.src=fileFor(top); disc.appendChild(dimg);
      const draw=document.createElement('div'); draw.className='uno-draw';
      draw.innerHTML='<div class="big">🂠</div><div>Pioche</div><div>('+s.draw.length+')</div>';
      if(canDraw) draw.addEventListener('click',()=>{ if(onDraw)onDraw(); });
      piles.appendChild(disc); piles.appendChild(draw); t.appendChild(piles);
      GC.center(t);
    }
    async function askColor(){ const a=await GC.ask([
        {id:'R',label:'🔴 Rouge',primary:true},{id:'G',label:'🟢 Vert'},{id:'B',label:'🔵 Bleu'},{id:'Y',label:'🟡 Jaune'}]);
      GC.setButtons([]); return a; }
    async function playCard(pi,card){ const idx=s.players[pi].hand.indexOf(card);
      let color=null; if(card.c==='W'){ GC.say('Choisissez une couleur.'); color=await askColor(); }
      const r=applyPlay(s,pi,idx,color);
      let msg=(pi===meHuman(pi)?'Vous jouez ':P[pi].name+' joue ')+vlabel(card)+(card.c==='W'?(' → '+CNAME[color]):'');
      if(r.drewInfo) msg+=' — '+P[r.drewInfo.who].name+' pioche '+r.drewInfo.n+' !';
      GC.combo(msg); }
    const meHuman=pi=>pi; // (helper for phrasing)

    async function humanTurn(pi){
      if(humans>1) await GC.handOff(P[pi].name);
      while(true){
        center(true); scores();
        const hand=s.players[pi].hand; const legal=legalIdx(s,pi);
        GC.say(legal.length?'À vous — jouez une carte surlignée, ou piochez.':'Aucune carte jouable — piochez.');
        const choice=await new Promise(res=>{
          onDraw=()=>res({draw:true});
          GC.hand(hand,{playable:c=>playable(c,s.top), onPick:c=>res({card:c})});
        });
        onDraw=null;
        if(choice.draw){
          drawN(s,pi,1); const drawn=s.players[pi].hand[s.players[pi].hand.length-1];
          center(false); scores(); GC.combo('Vous piochez '+vlabel(drawn)+((drawn.c!=='W')?(' '+CNAME[drawn.c]):'')+'.');
          if(playable(drawn,s.top)){
            GC.hand(s.players[pi].hand,{playable:c=>c===drawn, onPick:()=>{}});
            const a=await GC.ask([{id:'play',label:'Jouer '+vlabel(drawn),primary:true},{id:'keep',label:'Garder & passer'}]);
            GC.setButtons([]);
            if(a==='play'){ await playCard(pi,drawn); GC.hand([]); return; }
          }
          advance(s,1); GC.hand([]); return;
        } else { await playCard(pi,choice.card); GC.hand([]); return; }
      }
    }
    function aiTurn(pi){
      let legal=legalIdx(s,pi);
      if(!legal.length){ drawN(s,pi,1); legal=legalIdx(s,pi);
        if(!legal.length){ GC.combo(P[pi].name+' pioche et passe.'); advance(s,1); return; }
        GC.combo(P[pi].name+' pioche…'); }
      const hand=s.players[pi].hand;
      const rank=c=>{ if(c.v==='wild4')return 0; if(c.v==='wild')return 1;
        if(c.c===s.top.color && (c.v==='skip'||c.v==='rev'||c.v==='d2'))return 5;
        if(c.v==='skip'||c.v==='rev'||c.v==='d2')return 4;
        return c.c===s.top.color?3:2; };
      legal.sort((a,b)=>rank(hand[b])-rank(hand[a]));
      const idx=legal[0], card=hand[idx];
      const color=card.c==='W'?chooseColor(hand):null;
      const r=applyPlay(s,pi,idx,color);
      let msg=P[pi].name+' joue '+vlabel(card)+(card.c==='W'?(' → '+CNAME[color]):'');
      if(r.drewInfo) msg+=' — '+P[r.drewInfo.who].name+' pioche '+r.drewInfo.n+' !';
      GC.combo(msg);
    }

    GC.say('Posez une carte de même couleur ou même valeur. Videz votre main pour gagner !');
    center(false); scores(); await GC.sleep(1100);
    while(!s.over){
      const pi=s.turn, player=P[pi];
      scores();
      if(player.ai){ center(false); GC.say(player.name+' réfléchit…'); await GC.sleep(750); aiTurn(pi); center(false); await GC.sleep(650); }
      else { await humanTurn(pi); await GC.sleep(200); }
    }
    scores(); center(false);
    const wi=s.winner;
    return GC.gameOver('Victoire de '+P[wi].name+' !', P[wi].name+' a posé toutes ses cartes ! 🎉', P[wi].name);
  }
});
</script>
</body>
</html>
