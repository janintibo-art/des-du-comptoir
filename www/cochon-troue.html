<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Le Cochon troué</title>
<link rel="icon" href="favicon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14140f">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="cards.css">
<style>
.cochonwrap{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.cochon-board{position:relative;width:100%;max-width:430px;margin:0 auto;aspect-ratio:1216/1206;background-size:contain;background-repeat:no-repeat;background-position:center;filter:drop-shadow(0 5px 14px rgba(0,0,0,.5))}
.cochon-hole{position:absolute;transform:translate(-50%,-50%);aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cochon-hole .peg{width:auto;height:clamp(46px,12vw,76px);transform:translateY(-14%);filter:drop-shadow(0 2px 5px rgba(0,0,0,.6))}
.cochon-hole.exit{box-shadow:inset 0 0 0 3px rgba(20,20,16,.6);background:radial-gradient(circle,#1a1712 55%,transparent 70%)}
.cochon-hole.exit.flash{box-shadow:0 0 0 4px var(--accent),0 0 18px 3px rgba(224,163,76,.7)}
.hlabel{position:absolute;transform:translate(-50%,-50%);font-weight:bold;color:#5a3a22;font-size:clamp(11px,2.6vw,16px);opacity:.7}
.die-stage{--d:clamp(78px,20vw,104px);width:var(--d);height:var(--d);perspective:700px;margin-top:4px}
.die3d{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform 1.15s cubic-bezier(.18,.72,.24,1)}
.die3d .face{position:absolute;width:100%;height:100%;background:linear-gradient(135deg,#fbf7ee,#efe6d2);border:1px solid #cdb78d;border-radius:17%;box-shadow:inset 0 0 10px rgba(120,90,40,.18)}
.die3d .face.f1{transform:translateZ(calc(var(--d)/2))}
.die3d .face.f2{transform:rotateY(90deg) translateZ(calc(var(--d)/2))}
.die3d .face.f3{transform:rotateY(180deg) translateZ(calc(var(--d)/2))}
.die3d .face.f4{transform:rotateY(-90deg) translateZ(calc(var(--d)/2))}
.die3d .face.f5{transform:rotateX(90deg) translateZ(calc(var(--d)/2))}
.die3d .face.f6{transform:rotateX(-90deg) translateZ(calc(var(--d)/2))}
.die3d .pip{position:absolute;width:19%;height:19%;border-radius:50%;background:radial-gradient(circle at 35% 35%,#4a423a,#1a1610);transform:translate(-50%,-50%);box-shadow:inset 0 1px 1px rgba(255,255,255,.2)}
.dielabel{font-size:12px;opacity:.6;letter-spacing:.1em;min-height:1em}
.dice-tray{width:100%;max-width:430px;aspect-ratio:16/11;margin:0 auto;border-radius:22px;background:radial-gradient(ellipse at 50% 40%,#357a42,#1d4526 78%);border:9px solid #5a3a22;box-shadow:inset 0 0 34px rgba(0,0,0,.55),0 7px 18px rgba(0,0,0,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.dice-tray .tray-title{color:#ecdcb6;font-size:15px;letter-spacing:.12em;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.dice-tray .die-stage{--d:clamp(96px,28vw,150px)}
.lastdie{font-size:13px;opacity:.7;margin-top:2px}
.lastdie b{color:var(--accent)}
#cMsg,#cCombo{display:none!important}
.aw-toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(12px);max-width:92vw;background:rgba(20,20,16,.93);color:var(--cream);border:1px solid rgba(224,163,76,.5);border-radius:999px;padding:9px 18px;font-size:15px;box-shadow:0 6px 18px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:60;text-align:center}
.aw-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.aw-toast.strong{color:var(--accent);font-weight:bold;border-color:var(--accent)}
</style>
<script src="rules-data.js"></script>
<script src="card-shell.js"></script>
<script>
'use strict';
const NoSkin={ buildSkinSelect(sel){ sel.style.display='none'; }, el(){ return document.createElement('span'); } };
const HOLES=[
  {n:1,x:0.297,y:0.541},{n:2,x:0.492,y:0.599},{n:3,x:0.696,y:0.543},
  {n:4,x:0.295,y:0.723},{n:5,x:0.495,y:0.761},{n:6,x:0.693,y:0.741}
];
const PIPS={1:[[50,50]],2:[[28,28],[72,72]],3:[[28,28],[50,50],[72,72]],
  4:[[28,28],[72,28],[28,72],[72,72]],5:[[28,28],[72,28],[50,50],[28,72],[72,72]],
  6:[[28,25],[72,25],[28,50],[72,50],[28,75],[72,75]]};
const DROT={1:[0,0],2:[0,-90],3:[0,-180],4:[0,90],5:[-90,0],6:[90,0]};
function makeDie(face){
  const stage=document.createElement('div'); stage.className='die-stage';
  const cube=document.createElement('div'); cube.className='die3d';
  for(let n=1;n<=6;n++){ const f=document.createElement('div'); f.className='face f'+n;
    (PIPS[n]||[]).forEach(([x,y])=>{ const p=document.createElement('div'); p.className='pip'; p.style.left=x+'%'; p.style.top=y+'%'; f.appendChild(p); });
    cube.appendChild(f); }
  const r=DROT[face]||[0,0]; cube.style.transition='none'; cube.style.transform='rotateX('+r[0]+'deg) rotateY('+r[1]+'deg)';
  stage.appendChild(cube); return stage;
}
</script>
</head>
<body class="menu">
<script>
'use strict';
CardShell({
  id:'cochontroue', title:'LE COCHON TROUÉ', minPlayers:2, maxPlayers:6, skinModule:NoSkin,
  run: async GC => {
    (function(){ let el=document.getElementById('bwToast');
      if(!el){ el=document.createElement('div'); el.id='bwToast'; el.className='aw-toast'; document.body.appendChild(el); }
      let tmr=null; const show=(t,strong)=>{ if(!t){el.classList.remove('show');return;}
        el.textContent=t; el.classList.toggle('strong',!!strong); el.classList.add('show');
        clearTimeout(tmr); tmr=setTimeout(()=>el.classList.remove('show'), strong?2400:2900); };
      const oSay=GC.say,oCombo=GC.combo; GC.say=t=>{oSay&&oSay(t);show(t,false);}; GC.combo=t=>{oCombo&&oCombo(t);show(t,true);};
    })();
    const P=GC.players, N=P.length;
    // choix du nombre de cochons
    GC.center('<div style="text-align:center;opacity:.85">Chaque joueur reçoit des cochons.<br>Débarrassez-vous des vôtres en premier !</div>');
    GC.say('Combien de cochons par joueur ?');
    const off={2:20,3:20,4:15,5:12,6:10}[N]||Math.round(60/N);
    const choix=await GC.ask([
      {id:'6',label:'Rapide (6)',primary:true},{id:'10',label:'Normale (10)'},{id:''+off,label:'Officielle ('+off+')'}]);
    GC.setButtons([]);
    const pigsEach=parseInt(choix,10);
    P.forEach(p=>{ p.hand=pigsEach; p.finished=false; });
    let holes=[false,false,false,false,false];
    let dieFace=1;
    let pegStyle='clair'; try{ const v=localStorage.getItem('cochonPeg'); if(v)pegStyle=v; }catch(e){}
    let lastArgs=[-1,null,false];
    const occ=()=>holes.filter(Boolean).length;
    const finishOrder=[];
    let round=1, flashExit=false;

    const scores=turn=>GC.scores(P.map((p,i)=>({label:p.name,value:p.finished?'✓':p.hand,active:i===turn&&!p.finished})));
    function render(turn, dieVal, rolling){
      lastArgs=[turn,dieVal,rolling];
      const c=GC.center('');
      const wrap=document.createElement('div'); wrap.className='cochonwrap';
      const bar=document.createElement('div'); bar.style.cssText='display:flex;justify-content:flex-end;width:100%;max-width:430px;font-size:13px;opacity:.85';
      const lab=document.createElement('label'); lab.textContent='Bâtonnet : ';
      const sel=document.createElement('select'); sel.style.cssText='font-family:inherit;font-size:13px;background:rgba(20,20,16,.8);color:var(--cream);border:1px solid rgba(242,232,213,.3);border-radius:8px;padding:4px 7px;margin-left:4px';
      [['clair','Clair'],['fonce','Foncé']].forEach(([v,t])=>{ const o=document.createElement('option'); o.value=v; o.textContent=t; sel.appendChild(o); });
      sel.value=pegStyle; sel.addEventListener('change',()=>{ pegStyle=sel.value; try{localStorage.setItem('cochonPeg',pegStyle);}catch(e){} render.apply(null,lastArgs); });
      lab.appendChild(sel); bar.appendChild(lab); wrap.appendChild(bar);
      const board=document.createElement('div'); board.className='cochon-board'; board.style.backgroundImage='url(cochon/board.webp)';
      HOLES.forEach(h=>{ const d=document.createElement('div'); d.className='cochon-hole'+(h.n===6?' exit'+(flashExit?' flash':''):'');
        d.style.left=(h.x*100)+'%'; d.style.top=(h.y*100)+'%'; d.style.width='9%';
        if(h.n<=5 && holes[h.n-1]){ const img=document.createElement('img'); img.className='peg'; img.src='cochon/peg-'+pegStyle+'.webp'; d.appendChild(img); }
        board.appendChild(d); });
      wrap.appendChild(board);
      const cap=document.createElement('div'); cap.className='lastdie';
      cap.innerHTML = dieVal ? ('Dernier lancer : <b>'+dieVal+'</b>') : '&nbsp;';
      wrap.appendChild(cap); c.appendChild(wrap);
    }
    async function rollDie(turn){
      const v=1+Math.floor(Math.random()*6);
      // plateau de lancer dédié
      const c=GC.center('');
      const tray=document.createElement('div'); tray.className='dice-tray';
      const tt=document.createElement('div'); tt.className='tray-title'; tt.textContent='🎲 Lancer du dé…';
      const die=makeDie(dieFace);
      tray.appendChild(tt); tray.appendChild(die); c.appendChild(tray);
      const cube=die.querySelector('.die3d');
      if(cube){ void cube.offsetWidth;
        cube.style.transition='transform 1.2s cubic-bezier(.15,.7,.25,1)';
        const r=DROT[v]; cube.style.transform='rotateX('+(r[0]-720)+'deg) rotateY('+(r[1]-1080)+'deg)'; }
      GC.play();
      await GC.sleep(1300);
      dieFace=v;
      tt.innerHTML='Résultat : <b style="color:#ffd98a;font-size:20px">'+v+'</b>';
      await GC.sleep(750);
      return v;
    }
    function processRoll(v,p){
      if(v===6){ flashExit=true; setTimeout(()=>{flashExit=false;},400); if(p.hand>0)p.hand--; return {type:'exit'}; }
      const h=v-1; if(!holes[h]){ holes[h]=true; if(p.hand>0)p.hand--; return {type:'place',n:v}; }
      const taken=occ(); p.hand+=taken; holes=[false,false,false,false,false]; return {type:'bust',taken,n:v};
    }
    const remaining=()=>P.filter(p=>!p.finished).length;

    GC.say('Un 6 fait sortir un cochon par le trou du milieu. Un trou déjà occupé = vous ramassez tout !');
    scores(-1); render(-1,null,false); await GC.sleep(1200);

    let turn=0, guard=0;
    while(remaining()>1){
      if(++guard>4000) break;
      const p=P[turn];
      if(p.finished){ turn=(turn+1)%N; if(turn===0)round++; continue; }
      scores(turn);
      const minRolls = round===1?1 : round===2?2 : 1;
      let rolls=0, busted=false;
      while(true){
        if(rolls>=minRolls){
          if(round<=2) break;
          if(p.ai){ const stopAt=GC.aiRisk>1.1?4:(GC.aiRisk<0.8?2:3); if(occ()>=stopAt) break; }
          else { render(turn,null,false); GC.say('Relancer ou s\u2019arrêter ? ('+occ()+' trou(s) occupé(s))');
            const a=await GC.ask([{id:'roll',label:'Relancer 🎲'},{id:'stop',label:'Je m\u2019arrête ✋'}]); GC.setButtons([]); if(a==='stop') break; }
        } else {
          if(p.ai){ GC.say(p.name+' lance le dé…'); await GC.sleep(500); }
          else { render(turn,null,false); GC.say('À vous, '+p.name+' — lancez le dé.');
            await GC.ask([{id:'roll',label:'Lancer le dé 🎲'}]); GC.setButtons([]); }
        }
        const v=await rollDie(turn); rolls++;
        const res=processRoll(v,p); render(turn,v,false); scores(turn);
        if(res.type==='exit') GC.combo((p.ai?p.name:'Vous')+' : 6 ! Un cochon sort du jeu 🐷➡️');
        else if(res.type==='place') GC.combo((p.ai?p.name:'Vous')+' pose un cochon au trou '+res.n+'.');
        else { GC.combo('Trou '+res.n+' occupé ! '+(p.ai?p.name+' ramasse ':'Vous ramassez ')+res.taken+' cochon'+(res.taken>1?'s':'')+'.'); busted=true; }
        if(p.hand===0){ p.finished=true; finishOrder.push(turn);
          GC.combo('🎉 '+p.name+' n\u2019a plus de cochons !'); await GC.sleep(1300); break; }
        await GC.sleep(busted?1200:650);
        if(busted) break;
      }
      if(remaining()<=1) break;
      turn=(turn+1)%N; if(turn===0)round++;
    }
    // dernier joueur = perdant
    const loserIdx=P.findIndex(p=>!p.finished);
    if(loserIdx>=0){ finishOrder.push(loserIdx); }
    scores(-1); render(-1,null,false);
    const winner=P[finishOrder[0]], loser=P[loserIdx];
    return GC.gameOver('Victoire de '+winner.name+' !',
      '🐷 <b>'+(loser?loser.name:'?')+'</b> reste avec des cochons et perd.<br><br>'+
      'Ordre de sortie : '+finishOrder.map(i=>P[i].name).join(', ')+'.');
  }
});
</script>
</body>
</html>
