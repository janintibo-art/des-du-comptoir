<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>10 000</title>
<link rel="stylesheet" href="style.css">
<script src="lib/cannon.js"></script>
<script>if(typeof CANNON==='undefined')document.write('<script src="https://cdn.babylonjs.com/cannon.js"><\/script>')</script>
<script src="lib/babylon.js"></script>
<script>if(typeof BABYLON==='undefined')document.write('<script src="https://cdn.babylonjs.com/babylon.js"><\/script>')</script>
<script src="dice-engine.js"></script>
<script src="rules-data.js"></script>
<script src="game-core.js"></script>
</head>
<body>
<script>
'use strict';
const GOLD='#e0a34c', GREY='#8a8577', OPEN_AT=500, TARGET=10000;
function scoreSel(vals){
  if(vals.length===5){ const s=[...vals].sort().join(''); if(s==='12345'||s==='23456') return {points:1500, valid:true}; }
  const c=[0,0,0,0,0,0,0]; vals.forEach(v=>c[v]++);
  let pts=0;
  for(let v=1;v<=6;v++){
    let n=c[v];
    if(n>=3){ pts += (v===1?1000:v*100)*Math.pow(2,n-3); n=0; }
    if(v===1) pts+=n*100; else if(v===5) pts+=n*50; else if(n>0) return {points:0, valid:false};
  }
  return {points:pts, valid:pts>0};
}
function hasScoring(vals){
  const c={}; vals.forEach(v=>c[v]=(c[v]||0)+1);
  if(c[1]||c[5]) return true;
  for(const v in c) if(c[v]>=3) return true;
  if(vals.length===5){ const s=[...vals].sort().join(''); if(s==='12345'||s==='23456') return true; }
  return false;
}

GameShell({
  id:'10000', title:'10 000', diceCount:5, minPlayers:2, maxPlayers:4,
  hint:'1 = 100 \u00b7 5 = 50 \u00b7 brelan de n = n\u00d7100 (as = 1000) \u00b7 suite = 1500. Ouverture \u00e0 500. Rien qui marque = tour perdu !',
  run: async GC => {
    const T=GC.T, dice=T.dice, P=GC.players;
    P.forEach(p=>{ p.score=0; p.open=false; });
    const refresh = (act, turn, sel) => GC.scores([
      ...P.map((p,i)=>({label:p.name, value:p.score, active:i===act})),
      {label:'Tour', value:turn||0}, {label:'S\u00e9l.', value:sel||0},
    ]);
    const slot = i => ({x:-(T.AREA/2-1.9)+i*2.1, z:-(T.AREA/2-1.9)});

    async function humanTurn(p, idx){
      await GC.lineUp();
      let turnPts=0, pool=[...dice], thrown=false, selection=[];
      T.onPick(d=>{
        if(!d.selectable || d.aside) return;
        d.selected=!d.selected; T.setHalo(d, d.selected?GOLD:null);
        selection = dice.filter(x=>x.selected);
        paint();
      });
      function paint(){
        const sel = scoreSel(selection.map(d=>d.value));
        const remaining = pool.filter(d=>!d.selected).length;
        refresh(idx, turnPts + (sel.valid?sel.points:0), sel.valid?sel.points:0);
        const canBank = sel.valid && (p.open || turnPts + sel.points >= OPEN_AT);
        GC.setButtons([
          {id:'roll', primary:true, disabled: thrown && !sel.valid,
           label: !thrown ? 'Lancer les 5 d\u00e9s' : remaining===0 ? 'Main pleine \u2014 relancer les 5' : 'Relancer '+remaining+' d\u00e9'+(remaining>1?'s':'')},
          {id:'bank', label:'Banquer', disabled: !thrown || !canBank},
        ]);
        if(thrown){
          if(selection.length && !sel.valid) GC.combo('S\u00e9lection invalide');
          else if(sel.valid) GC.combo('+'+sel.points+' pts');
          else GC.combo('');
          if(sel.valid && !canBank) GC.say('Il faut '+OPEN_AT+' points d\u2019un coup pour ouvrir ('+(turnPts+sel.points)+'/'+OPEN_AT+').');
        }
      }
      GC.say('\u00c0 vous, '+p.name+' !'); GC.combo(''); paint();
      while(true){
        const a = await GC.waitAction();
        const sel = scoreSel(selection.map(d=>d.value));
        if(a==='bank' && thrown && sel.valid){
          turnPts += sel.points;
          if(!p.open && turnPts >= OPEN_AT){ p.open=true; GC.say(p.name+' ouvre avec '+turnPts+' points !'); }
          p.score += turnPts;
          GC.combo('\u2713 +'+turnPts+' pts'); refresh(-1,0,0);
          break;
        }
        if(a!=='roll') continue;
        GC.setButtons([]);
        if(thrown){
          turnPts += sel.points;
          const chosen=[...selection], rest=pool.filter(d=>!d.selected);
          if(rest.length===0){
            GC.say('Main pleine ! On repart avec les 5 d\u00e9s ('+turnPts+' pts en jeu).');
            await GC.lineUp(); pool=[...dice];
          } else {
            const taken = dice.filter(d=>d.aside).length;
            await Promise.all(chosen.map((d,i)=>{
              d.aside=true; d.selected=false; d.selectable=false; T.setHalo(d,GREY);
              const s=slot(taken+i); return T.moveTo(d,s.x,s.z);
            }));
            pool = rest;
          }
          selection=[]; dice.forEach(d=>d.selected=false);
        }
        GC.say('Les d\u00e9s roulent\u2026');
        await T.throwDice(pool);
        thrown=true;
        if(!hasScoring(pool.map(d=>d.value))){
          GC.combo('\u2717 Rien ne marque !');
          GC.say(p.name+' perd les '+turnPts+' points du tour.');
          refresh(-1,0,0); await GC.sleep(2000);
          break;
        }
        pool.forEach(d=>d.selectable=true);
        GC.say('S\u00e9lectionnez les d\u00e9s qui marquent, puis relancez ou banquez.');
        paint();
      }
      dice.forEach(d=>{ d.selectable=false; });
      GC.setButtons([]);
    }

    function aiPicks(pool, takeAll){
      const vals=pool.map(d=>d.value);
      if(vals.length===5){ const s=[...vals].sort().join(''); if(s==='12345'||s==='23456') return [...pool]; }
      const c={}; vals.forEach(v=>c[v]=(c[v]||0)+1);
      const picks=pool.filter(d=> c[d.value]>=3 || d.value===1 || (d.value===5 && takeAll));
      if(!picks.length){ const f=pool.find(d=>d.value===5); if(f) picks.push(f); }
      return picks;
    }
    async function aiTurn(p, idx){
      await GC.lineUp();
      let turnPts=0, pool=[...dice];
      GC.say(p.name+' joue\u2026'); GC.combo(''); refresh(idx,0,0);
      while(true){
        await GC.sleep(600);
        await T.throwDice(pool);
        if(!hasScoring(pool.map(d=>d.value))){
          GC.combo('\u2717 '+p.name+' ne marque rien !');
          GC.say(p.name+' perd les '+turnPts+' points de son tour.');
          await GC.sleep(1800); return;
        }
        const all=aiPicks(pool,true);
        const allPts=scoreSel(all.map(d=>d.value)).points;
        const potential=turnPts+allPts, restN=pool.length-all.length;
        const canBank = p.open || potential>=OPEN_AT;
        if(canBank && (p.score+potential>=TARGET || potential >= 700*GC.aiRisk || (potential >= 350*GC.aiRisk && restN<=2))){
          all.forEach(d=>T.setHalo(d,GOLD));
          p.open=true; p.score+=potential;
          GC.combo(p.name+' banque +'+potential+' pts'); refresh(-1,0,0);
          await GC.sleep(1700); return;
        }
        const picks=aiPicks(pool,false);
        const pts=scoreSel(picks.map(d=>d.value)).points;
        turnPts+=pts;
        picks.forEach(d=>T.setHalo(d,GOLD));
        GC.combo(p.name+' garde +'+pts+' pts ('+turnPts+' en jeu)');
        refresh(idx,turnPts,0);
        await GC.sleep(1100);
        const rest=pool.filter(d=>!picks.includes(d));
        if(rest.length===0){ GC.say('Main pleine pour '+p.name+' !'); await GC.lineUp(); pool=[...dice]; }
        else {
          const taken=dice.filter(d=>d.aside).length;
          await Promise.all(picks.map((d,i)=>{ d.aside=true; T.setHalo(d,GREY); const s=slot(taken+i); return T.moveTo(d,s.x,s.z); }));
          pool=rest;
          GC.say(p.name+' relance '+pool.length+' d\u00e9'+(pool.length>1?'s':'')+'\u2026');
        }
      }
    }

    refresh(-1,0,0);
    while(true){
      for(let i=0;i<P.length;i++){
        const p=P[i];
        if(p.ai) await aiTurn(p,i); else await humanTurn(p,i);
        if(p.score>=TARGET)
          return GC.gameOver(p.ai ? p.name+' gagne\u2026' : 'Victoire de '+p.name+' !',
            p.name+' atteint les 10 000 points ('+P.map(x=>x.name+' : '+x.score).join(' \u00b7 ')+').');
      }
    }
  }
});
</script>
</body>
</html>
